block.command-center.name = Centro de Mando
block.command-center.description = Controla el comportamiento de las unidades con 3 comandos: Ataque, Defensa y Retirada.\n\nAtaque: Las unidades buscan y atacan objetivos enemigos.\nDefensa: Las unidades se mueven a la estructura aliada más cercana, priorizando muros y torres.\nRetirada: Las unidades regresan al núcleo más cercano.

command.cc-attack = Ataque
command.cc-attack.description = Las unidades buscan y atacan objetivos enemigos, cruzando obstáculos cuando es posible.

command.cc-defend = Defensa
command.cc-defend.description = Las unidades se mueven a la estructura aliada más cercana, priorizando muros y torres defensivas.

command.cc-retreat = Retirada
command.cc-retreat.description = Las unidades regresan al núcleo más cercano.
