block.command-center.name = Command Center
block.command-center.description = Controls unit behaviour with 3 commands: Attack, Defend, and Retreat.\n\nAttack: Units seek and attack enemy units/structures.\nDefend: Units move to nearest allied structure, prioritizing walls and turrets.\nRetreat: Units fall back to the nearest core.

command.cc-attack = Attack
command.cc-attack.description = Units will seek and attack enemy targets, crossing obstacles when possible.

command.cc-defend = Defend
command.cc-defend.description = Units will move to the nearest allied structure, prioritizing walls and defensive turrets.

command.cc-retreat = Retreat
command.cc-retreat.description = Units will fall back to the nearest core.
